name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Only run when the comment contains @claude
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --agent coordinator-agent
            --max-turns 20
            --model sonnet

# NOTE:
# - ANTHROPIC_API_KEY must be added in Settings → Secrets → Actions
# - --agent coordinator-agent: runs coordinator as the main thread (critical!)
# - --max-turns 20: enough for a multi-phase feature, but limits cost if agent enters a loop
# - The coordinator is instructed to NEVER auto-merge a PR (see .claude/agents/coordinator-agent.md)
